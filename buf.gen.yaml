version: v2
managed:
  enabled: true
#  override:
#   - file_option: go_package_prefix
#     value: pomeloServe/proto/pd
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: proto/pd
    opt: paths=source_relative

  # - local: protoc-gen-go-grpc
  - remote: buf.build/grpc/go:v1.6.1
    out: proto/pd
    opt:
      - paths=source_relative
#  - remote: buf.build/connectrpc/gosimple
#    out: proto/pd
#    opt:
#      - paths=source_relative
#      - simple
  - remote: buf.build/grpc-ecosystem/gateway:v2.29.0
    out: proto/pd
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/csharp:v1.80.0
    out: proto/csharp
    opt:
      - base_namespace=
      # grpc/csharp depends on protocolbuffers/csharp
  - remote: buf.build/protocolbuffers/csharp:v34.1
    out: proto/csharp
    opt:
      - base_namespace=

inputs:
  - directory: proto
